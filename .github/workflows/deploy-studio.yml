name: Deploy Sanity Studio

on:
  push:
    branches: [main, master]
    paths:
      - 'studio/**'
      - '.github/workflows/deploy-studio.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: studio/pnpm-lock.yaml

      - name: Install Studio dependencies
        working-directory: studio
        run: pnpm install --frozen-lockfile

      - name: Require SANITY_AUTH_TOKEN
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: test -n "$SANITY_AUTH_TOKEN" || (echo '::error::Add repository secret SANITY_AUTH_TOKEN (https://sanity.io/manage → your project → API). Use a token with access to deploy Studio; it is not the same as SANITY_WRITE_TOKEN.' && exit 1)

      - name: Deploy to Sanity Hosting
        working-directory: studio
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: pnpm exec sanity deploy -y
